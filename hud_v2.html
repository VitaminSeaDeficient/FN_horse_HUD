<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FN Horse HUD</title>
<style>
  :root {
    --bg:           #141414;
    --bg-card:      #1e1e1e;
    --bg-section:   #252525;
    --border:       rgba(255,255,255,0.07);
    --text-primary: #f0f0f0;
    --text-muted:   #888;
    --text-dim:     #777;

    --col-hunger:    #FF6B00;
    --col-thirst:    #0077FF;
    --col-mood:      #AA00FF;
    --col-hygiene:   #FF0099;
    --col-energy:    #CCFF00;
    --col-health:    #FF1744;
    --col-digestive: #00E676;
    --col-nutrient:  #00E5FF;

    --col-warn:     #e8a838;
    --col-danger:   #e05252;
    --track-color:  rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .horse-info { display: flex; align-items: center; gap: 8px; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg-section);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .horse-name {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    font-family: "Bebas Neue", sans-serif;
    letter-spacing: 0.06em;
  }

  .activity-pill {
    font-size: 14px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid;
    white-space: nowrap;
  }
  .pill-idle  { color: #00E676; border-color: rgba(0,230,118,0.3);  background: rgba(0,230,118,0.1);  }
  .pill-light { color: #e8a838; border-color: rgba(232,168,56,0.3); background: rgba(232,168,56,0.1); }
  .pill-heavy { color: #FF1744; border-color: rgba(255,23,68,0.3);  background: rgba(255,23,68,0.1);  }

  /* ── BODY ── */
  .body {
    flex: 1;
    overflow: hidden;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-family: "Bebas Neue", sans-serif;
  }

  /* ── RING GRID ── */
  .ring-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }

  .ring-svg {
    width: 125px;
    height: 125px;
    transform: rotate(135deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--track-color);
    stroke-width: 8;
    stroke-linecap: butt;
  }

  .ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: butt;
    transition: stroke-dashoffset 0.6s ease, stroke 0.4s ease;
  }

  .ring-label {
    font-size: 27px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    font-family: "Bebas Neue", sans-serif;
    letter-spacing: 0.05em;
  }
  .ring-label-sm { font-size: 19px; font-family: "Bebas Neue", sans-serif; }

  /* ── ACTION BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1;
    padding: 14px 4px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--bg-section);
    font-size: 18px;
    font-weight: 600;
    font-family: "Bebas Neue", sans-serif;
    text-align: center;
    cursor: default;
    letter-spacing: 0.06em;
  }
  .action-btn.water { background: rgba(0,119,255,0.15);   border-color: rgba(0,119,255,0.4);   color: #0077FF; }
  .action-btn.treat { background: rgba(170,0,255,0.15);   border-color: rgba(170,0,255,0.4);   color: #AA00FF; }
  .action-btn.groom { background: rgba(255,0,153,0.15);   border-color: rgba(255,0,153,0.4);   color: #FF0099; }
  .action-btn.rest  { background: rgba(204,255,0,0.15);   border-color: rgba(204,255,0,0.4);   color: #CCFF00; }

  /* Value in center — overlaid via absolute */
  .ring-container {
    position: relative;
    width: 125px;
    height: 125px;
  }

  .ring-val {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    font-family: "Bebas Neue", sans-serif;
    color: var(--text-primary);
    pointer-events: none;
    letter-spacing: 0.04em;
  }
  .ring-val.warn   { color: var(--col-warn); }
  .ring-val.danger { color: var(--col-danger); }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── COUNTERS ── */
  .counters {
    display: flex;
    gap: 6px;
  }

  .counter {
    flex: 1;
    background: var(--bg-section);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 4px;
    text-align: center;
  }

  .counter-val {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .counter-lbl {
    font-size: 9px;
    color: #999;
    margin-top: 1px;
  }

  /* ── ALERTS ── */
  .alerts {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
  }

  .alert {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 10px;
    border: 1px solid;
  }

  .alert-warn {
    background: rgba(232,168,56,0.1);
    border-color: rgba(232,168,56,0.25);
    color: var(--col-warn);
  }

  .alert-danger {
    background: rgba(224,82,82,0.1);
    border-color: rgba(224,82,82,0.25);
    color: var(--col-danger);
  }

  .alert-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .alert-warn   .alert-dot { background: var(--col-warn); }
  .alert-danger .alert-dot { background: var(--col-danger); }

  /* ── FOOTER ── */
  .footer {
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .footer-label { font-size: 10px; color: var(--text-dim); }

  /* ── CRITICAL ── */
  /* ── COLIC BANNER ── */
  .colic-banner {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    border: 1px solid;
    animation: pulse-border-colic 1.5s ease-in-out infinite;
  }
  .colic-banner.visible { display: flex; }
  .colic-mild   { background: rgba(232,168,56,0.12); border-color: rgba(232,168,56,0.4); color: #e8a838; }
  .colic-severe { background: rgba(224,82,82,0.12);  border-color: rgba(224,82,82,0.4);  color: #e05252; animation: pulse-border 1s ease-in-out infinite; }
  @keyframes pulse-border-colic {
    0%,100% { border-color: rgba(232,168,56,0.4); background: rgba(232,168,56,0.08); }
    50%     { border-color: rgba(232,168,56,0.8); background: rgba(232,168,56,0.18); }
  }

  .critical-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,60,60,0.12);
    border: 1px solid rgba(255,60,60,0.35);
    border-radius: 6px;
    padding: 6px 10px;
    animation: pulse-border 1s ease-in-out infinite;
  }
  .critical-banner.visible { display: flex; }

  .critical-text {
    font-size: 11px;
    font-weight: 600;
    color: #ff3c3c;
    animation: pulse-text 1s ease-in-out infinite;
  }

  .critical-countdown {
    font-size: 11px;
    font-weight: 700;
    color: #ff3c3c;
    font-variant-numeric: tabular-nums;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: rgba(255,60,60,0.35); background: rgba(255,60,60,0.08); }
    50%       { border-color: rgba(255,60,60,0.7);  background: rgba(255,60,60,0.18); }
  }

  @keyframes pulse-text {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* ── DEAD OVERLAY ── */
  .dead-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .dead-overlay.visible { display: flex; }

  .dead-icon { font-size: 36px; animation: float 3s ease-in-out infinite; }
  .dead-name { font-size: 14px; font-weight: 600; color: #ccc; }
  .dead-msg  { font-size: 11px; color: #555; text-align: center; padding: 0 20px; line-height: 1.5; }
  .dead-sub  {
    font-size: 10px; color: #FF1744;
    border: 1px solid rgba(255,23,68,0.3);
    background: rgba(255,23,68,0.08);
    border-radius: 99px;
    padding: 3px 10px;
    animation: pulse-text 2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }
</style>
</head>
<body>

<!-- Dead overlay -->
<div class="dead-overlay" id="dead-overlay">
  <div class="dead-icon">💀</div>
  <div class="dead-name" id="dead-name">Shadowmere</div>
  <div class="dead-msg">has collapsed and needs<br>emergency care</div>
  <div class="dead-sub">Use revival item</div>
</div>

<!-- Header -->
<div class="header">
  <div class="horse-info">
    <div class="avatar">
  <!-- Replace horseshoe.png with your image filename -->
  <img src="horseshoe.png" width="24" height="24" style="object-fit:contain;">
</div>
    <div>
      <div class="horse-name" id="horse-name">Shadowmere</div>
    </div>
  </div>
  <span class="activity-pill pill-idle" id="activity-pill">Idle</span>
</div>

<!-- Body -->
<div class="body">

  <div class="critical-banner" id="critical-banner">
    <span class="critical-text">⚠ CRITICAL</span>
    <span class="critical-countdown" id="critical-countdown">10:00</span>
  </div>
  <div class="colic-banner colic-mild" id="colic-banner"></div>

  <!-- Visible stats rings -->
  <div>
    <div class="section-label">Condition</div>
    <div class="ring-grid" id="rings-visible"></div>
  </div>

  <hr class="divider">

  <!-- Hidden stats rings -->
  <div>
    <div class="section-label">Overall Health</div>
    <div class="ring-grid" id="rings-hidden"></div>
  </div>

  <hr class="divider">

  <!-- Counters -->
  <div>
    <div class="section-label">Today</div>
    <div class="counters">
      <div class="counter">
        <div class="counter-val" id="cnt-grains">0/2</div>
        <div class="counter-lbl">grains</div>
      </div>
      <div class="counter">
        <div class="counter-val" id="cnt-treats">0/5</div>
        <div class="counter-lbl">treats</div>
      </div>
    </div>
  </div>

  <div class="alerts" id="alerts"></div>

</div>

<!-- Action buttons -->
<div class="btn-row">
  <div class="action-btn water">Water</div>
  <div class="action-btn treat">TREAT !</div>
  <div class="action-btn groom">Groom</div>
  <div class="action-btn rest">Rest</div>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-label" id="footer-label">No horse connected</span>
</div>

<script>
  var R = 40;
  var CIRC = 2 * Math.PI * R;

  // 75% arc
  var ARC = CIRC * 0.75;

  var statDefs = [
    { id:'hunger',    label:'Hunger',    color:'#FF6B00', grid:'visible' },
    { id:'thirst',    label:'Thirst',    color:'#0077FF', grid:'visible' },
    { id:'mood',      label:'Mood',      color:'#AA00FF', grid:'visible' },
    { id:'hygiene',   label:'Hygiene',   color:'#FF0099', grid:'visible' },
    { id:'energy',    label:'Energy',    color:'#CCFF00', grid:'visible' },
    { id:'health',    label:'Health',    color:'rgba(255,255,255,0.82)', grid:'hidden', isInternal: true, smallLabel: true },
    { id:'digestive', label:'Digestive', color:'rgba(255,255,255,0.82)', grid:'hidden', isInternal: true, smallLabel: true },
    { id:'nutrient',  label:'Nutrient',  color:'rgba(255,255,255,0.82)', grid:'hidden', isInternal: true, smallLabel: true }
  ];

  // Build ring HTML for each stat
  statDefs.forEach(function(s) {
    var container = document.getElementById('rings-' + s.grid);

    var wrap = document.createElement('div');
    wrap.className = 'ring-wrap';

    var rc = document.createElement('div');
    rc.className = 'ring-container';

    // SVG ring
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 96 96');
    svg.setAttribute('class', 'ring-svg');

    // Track (full circle, dimmed)
    var track = document.createElementNS(svgNS, 'circle');
    track.setAttribute('cx', '48');
    track.setAttribute('cy', '48');
    track.setAttribute('r', String(R));
    track.setAttribute('class', 'ring-track');
    track.setAttribute('stroke-width', '16');
    track.id = 'track-' + s.id;
    // Track shows only the quarter arc length
    track.setAttribute('stroke-dasharray', ARC + ' ' + CIRC);
    track.setAttribute('stroke-dashoffset', '0');
    svg.appendChild(track);

    // Fill arc
    var fill = document.createElementNS(svgNS, 'circle');
    fill.setAttribute('cx', '48');
    fill.setAttribute('cy', '48');
    fill.setAttribute('r', String(R));
    fill.setAttribute('class', 'ring-fill');
    fill.setAttribute('stroke-width', '16');
    fill.setAttribute('stroke', s.color);
    fill.setAttribute('stroke-dasharray', ARC + ' ' + CIRC);
    fill.setAttribute('stroke-dashoffset', String(ARC));
    fill.id = 'ring-' + s.id;
    svg.appendChild(fill);

    rc.appendChild(svg);

    // Value label overlay
    var val = document.createElement('div');
    val.className = 'ring-val';
    val.id = 'rv-' + s.id;
    val.textContent = '0';
    rc.appendChild(val);

    wrap.appendChild(rc);

    // Stat name label
    var lbl = document.createElement('div');
    lbl.className = 'ring-label' + (s.smallLabel ? ' ring-label-sm' : '');
    lbl.textContent = s.label;
    wrap.appendChild(lbl);

    container.appendChild(wrap);
  });

  function setStat(id, v) {
    v = Math.round(Math.max(0, Math.min(100, v)));
    var fill  = document.getElementById('ring-' + id);
    var track = document.getElementById('track-' + id);
    var val   = document.getElementById('rv-'   + id);
    if (!fill || !val) return;

    var s = statDefs.find(function(x) { return x.id === id; });
    var isInternal = s && s.isInternal;

    // Dashoffset: ARC = empty, 0 = full
    var offset = ARC - (v / 100) * ARC;
    fill.setAttribute('stroke-dashoffset', String(offset));

    // Thresholds: warn at 49 or below, danger at 20 or below
    var isDanger = v <= 20;
    var isWarn   = v <= 49 && !isDanger;

    if (isInternal) {
      // Internal stats: ring colour AND number change
      if (isDanger)     fill.setAttribute('stroke', '#FF1744');
      else if (isWarn)  fill.setAttribute('stroke', '#e8a838');
      else              fill.setAttribute('stroke', s ? s.color : 'rgba(255,255,255,0.82)');
    } else {
      // Visible stats: ring colour never changes
      fill.setAttribute('stroke', s ? s.color : '#fff');
    }

    val.textContent = v;
    val.className = 'ring-val' + (isDanger ? ' danger' : isWarn ? ' warn' : '');
  }

  function setActivity(level) {
    var pill = document.getElementById('activity-pill');
    var map = { '0':['Idle','pill-idle'], '1':['Light work','pill-light'], '2':['Heavy work','pill-heavy'] };
    var d = map[String(level)] || map['0'];
    pill.textContent = d[0];
    pill.className = 'activity-pill ' + d[1];
  }

  function updateAlerts(stats) {
    var labels = {
      hunger:'Hunger', thirst:'Thirst', mood:'Mood', hygiene:'Hygiene',
      energy:'Energy', health:'Health', digestive:'Digestive', nutrient:'Nutrient balance'
    };

    // Build list of triggered alerts with their value for sorting
    var alerts = [];
    statDefs.forEach(function(s) {
      var v = stats[s.id] || 0;
      if (v <= 49) alerts.push({ id: s.id, v: v });
    });

    // Sort by value ascending — lowest (worst) first
    alerts.sort(function(a, b) { return a.v - b.v; });

    var html = '';
    var MAX_VISIBLE = 3;
    var shown = 0;
    alerts.forEach(function(a) {
      if (shown >= MAX_VISIBLE) return;
      if (a.v <= 20)
        html += '<div class="alert alert-danger">◥◣◥◣◥◣&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;WARNING !&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;◢◤◢◤◢◤  :  ' + labels[a.id] + ' is critically low.</div>';
      else
        html += '<div class="alert alert-warn">⚠︎&nbsp;&nbsp;&nbsp;CAUTION  : ' + labels[a.id] + ' is below 50.</div>';
      shown++;
    });
    if (alerts.length > MAX_VISIBLE) {
      var remaining = alerts.length - MAX_VISIBLE;
      html += '<div style="font-size:10px;color:var(--text-dim);text-align:center;padding:2px 0;">+ ' + remaining + ' more warning' + (remaining > 1 ? 's' : '') + '...</div>';
    }

    document.getElementById('alerts').innerHTML = html;
  }

  function setCritical(isCritical, secondsRemaining) {
    var banner = document.getElementById('critical-banner');
    if (isCritical) {
      banner.classList.add('visible');
      var m = Math.floor(secondsRemaining / 60);
      var s = secondsRemaining % 60;
      document.getElementById('critical-countdown').textContent =
        m + ':' + (s < 10 ? '0' : '') + s;
    } else {
      banner.classList.remove('visible');
    }
  }

  function setColic(isColicking, isSevere) {
    var banner = document.getElementById('colic-banner');
    if (isColicking) {
      banner.classList.add('visible');
      if (isSevere) {
        banner.className = 'colic-banner colic-severe visible';
        banner.textContent = '🚨 SEVERE COLIC — Vet kit required immediately!';
      } else {
        banner.className = 'colic-banner colic-mild visible';
        banner.textContent = '🤢 MILD COLIC — Give water and hay now';
      }
    } else {
      banner.classList.remove('visible');
      banner.textContent = '';
    }
  }

  function setDead(isDead, name) {
    var overlay = document.getElementById('dead-overlay');
    if (isDead) {
      overlay.classList.add('visible');
      document.getElementById('dead-name').textContent = name || 'Horse';
    } else {
      overlay.classList.remove('visible');
    }
  }

  function applyParams() {
    var p = new URLSearchParams(window.location.search);
    var name = p.get('name') || 'Shadowmere';
    document.getElementById('horse-name').textContent = name;
    document.getElementById('footer-label').textContent = p.get('slot') || '1 of 1 horses';

    var defaults = {
      hunger:50, thirst:50, mood:45, hygiene:19,
      energy:50, health:50, digestive:19, nutrient:45
    };
    var stats = {};
    statDefs.forEach(function(s) {
      var v = parseFloat(p.get(s.id));
      if (isNaN(v)) v = defaults[s.id];
      stats[s.id] = v;
      setStat(s.id, v);
    });

    setActivity(p.get('activity') || '0');
    updateAlerts(stats);

    document.getElementById('cnt-grains').textContent = (p.get('grains') || '1') + '/2';
    document.getElementById('cnt-treats').textContent = (p.get('treats') || '2') + '/5';

    var isDead     = p.get('dead')     === '1';
    var isCritical = p.get('critical') === '1';
    var remaining  = parseInt(p.get('remaining')) || 0;

    var isColicking = p.get('colicking') === '1';
    var isSevere    = p.get('severe')    === '1';

    setDead(isDead, name);
    setCritical(!isDead && isCritical, remaining);
    setColic(!isDead && isColicking, isSevere);
  }

  applyParams();
</script>
</body>
</html>
